<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0" />
    <title>新浪島嶼 New Wave Island</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans:wght@300;400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"><div id="js-loading" style="padding:2rem;font-family:sans-serif;color:#333">Loading…</div></div>
    <script>
      window.__appError = null;
      window.addEventListener('error', function(e) {
        window.__appError = e.message + ' (' + e.filename + ':' + e.lineno + ')';
        document.getElementById('js-loading').textContent = 'JS Error: ' + window.__appError;
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.__appError = String(e.reason);
        document.getElementById('js-loading').textContent = 'Promise Error: ' + window.__appError;
      });
      setTimeout(function() {
        var el = document.getElementById('js-loading');
        if (el) el.textContent = 'Script timeout – JS did not run. Check console.';
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
